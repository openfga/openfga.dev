name: Update OpenFGA Documentation

on:
  # Nightly @ 5AM UTC
  schedule:
    - cron: '0 5 * * *'
  # When triggered manually
  workflow_dispatch:

concurrency:
  group: update-openfga-documentation
  cancel-in-progress: false

jobs:
  update-docs:
    name: Update OpenFGA Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write # Commit docs changes to the repository
    steps:
      - name: Cached LFS checkout
        uses: nschloe/action-cached-lfs-checkout@385a8ecc719e50b8c71af6ab01a624b486b7c3bc

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update configuration docs
        run: npm run build:config-page

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit updated config documentation
        uses: stefanzweifel/git-auto-commit-action@778341af668090896ca464160c2def5d1d1a3eb0 #v6.0.1
        with:
          commit_message: 'docs: auto-update OpenFGA configuration documentation'
          file_pattern: 'docs/content/getting-started/setup-openfga/configuration.mdx'
          commit_user_name: 'openfga-releaser-bot'
          commit_user_email: '${{ steps.import-gpg.outputs.email }}'
          commit_author: 'openfga-releaser-bot <${{ steps.import-gpg.outputs.email }}>'
