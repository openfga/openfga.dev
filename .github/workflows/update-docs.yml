name: Update OpenFGA Documentation

on:
  # Nightly @ 5AM UTC
  schedule:
    - cron: '0 5 * * *'
  # When triggered manually
  workflow_dispatch:

concurrency:
  group: update-openfga-documentation
  cancel-in-progress: false

jobs:
  update-docs:
    name: Update OpenFGA Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write # Push docs update branches to the repository
      pull-requests: write # Create or update docs update pull requests
    env:
      UPDATE_BRANCH: docs/update-openfga-configuration
      UPDATE_FILE: docs/content/getting-started/setup-openfga/configuration.mdx
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Cached LFS checkout
        uses: nschloe/action-cached-lfs-checkout@385a8ecc719e50b8c71af6ab01a624b486b7c3bc

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update configuration docs
        run: npm run build:config-page

      - name: Check for documentation changes
        id: changes
        run: |
          if git diff --quiet -- "$UPDATE_FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No configuration documentation changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate token
        if: steps.changes.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASER_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - name: Import GPG key
        if: steps.changes.outputs.changed == 'true'
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Configure Git
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name openfga-releaser-bot
          git config user.email "${{ steps.import-gpg.outputs.email }}"

      - name: Create or update docs pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git checkout -B "$UPDATE_BRANCH"
          git add "$UPDATE_FILE"
          git commit -m "docs: auto-update OpenFGA configuration documentation"

          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          remote_sha="$(git ls-remote --heads "$repo_url" "$UPDATE_BRANCH" | awk '{print $1}')"

          if [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/${UPDATE_BRANCH}:${remote_sha}" "$repo_url" "HEAD:${UPDATE_BRANCH}"
          else
            git push "$repo_url" "HEAD:${UPDATE_BRANCH}"
          fi

          pr_body="$(cat <<'BODY'
This automated PR updates the generated OpenFGA configuration documentation from the latest OpenFGA release schema.
BODY
          )"
          pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$UPDATE_BRANCH" --state open --json number --jq '.[0].number')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --title "docs: auto-update OpenFGA configuration documentation" \
              --body "$pr_body"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$BASE_BRANCH" \
              --head "$UPDATE_BRANCH" \
              --title "docs: auto-update OpenFGA configuration documentation" \
              --body "$pr_body"
          fi
